<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mohaned & Nouran — Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Cinzel&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Cormorant Garamond',serif;background:#0f0404;overflow-x:hidden;}

#curtain-screen{position:fixed;inset:0;z-index:100;}

.c-panel{position:absolute;top:0;width:50%;height:100%;transition:transform 3s ease;z-index:4;}
.c-left{left:0;background:#7a1212;}
.c-right{right:0;background:#7a1212;}
.c-left.open{transform:translateX(-100%);}
.c-right.open{transform:translateX(100%);}

.stage-bg{position:absolute;inset:0;background:#fffaf4;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}

.valance,.valance-bot{position:absolute;left:0;right:0;height:60px;background:#7a1212;z-index:6;}
.valance{top:0;}
.valance-bot{bottom:0;}

.curtain-overlay{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:white;}

#open-btn{padding:14px 40px;border:1px solid gold;background:transparent;color:white;cursor:pointer;}

#main-content{display:none;text-align:center;padding:40px;}

#confetti-container{position:fixed;inset:0;pointer-events:none;}

.cp{position:absolute;width:10px;height:10px;background:red;animation:fall 4s linear forwards;}

@keyframes fall{to{transform:translateY(100vh) rotate(360deg);opacity:0;}}
</style>
</head>

<body>

<!-- CURTAIN -->
<div id="curtain-screen">

  <div class="stage-bg">
    <h2>You are invited</h2>
    <h1>Mohaned & Nouran</h1>
  </div>

  <div class="valance"></div>
  <div class="valance-bot"></div>

  <div class="c-panel c-left" id="cl"></div>
  <div class="c-panel c-right" id="cr"></div>

  <div class="curtain-overlay">
    <h2>Mohaned & Nouran</h2>
    <button id="open-btn" onclick="openCurtain()">Open Invitation</button>
  </div>

</div>

<!-- MAIN -->
<div id="main-content">
  <h1>💍 Welcome</h1>
  <p>Wedding Invitation</p>
</div>

<div id="confetti-container"></div>

<script>
var audio;

function openCurtain(){

  document.getElementById('cl').classList.add('open');
  document.getElementById('cr').classList.add('open');

  // 🎵 MUSIC
  audio = new Audio('song.mp3');
  audio.loop = true;
  audio.volume = 0.8;
  audio.currentTime = 33;
  audio.play().catch(()=>{});

  setTimeout(()=>{
    document.getElementById('curtain-screen').style.display='none';
    document.getElementById('main-content').style.display='block';
    launchConfetti();
  },3000);
}

// 🎉 CONFETTI
function launchConfetti(){
  let box = document.getElementById("confetti-container");

  for(let i=0;i<80;i++){
    let d=document.createElement("div");
    d.className="cp";
    d.style.left=Math.random()*100+"vw";
    d.style.background=["gold","white","pink","#c9a96e"][Math.floor(Math.random()*4)];
    d.style.animationDuration=(2+Math.random()*3)+"s";
    box.appendChild(d);

    setTimeout(()=>d.remove(),5000);
  }
}
</script>

</body>
</html>
